name: Bug Report
description: Report a crash, broken behavior, or bad asset/data state.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: observed
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, world type, seed, and mod profile if relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the relevant crash or latest.log excerpt.
